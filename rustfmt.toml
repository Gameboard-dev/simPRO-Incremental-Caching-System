edition = "2024"
max_width = 120
newline_style = "Unix"
tab_spaces = 4

# Prefer compact one-line forms when they still fit comfortably within max_width.
use_small_heuristics = "Max"
fn_call_width = 100
attr_fn_like_width = 100
chain_width = 100
array_width = 100

# Keep module and import declarations deterministic without nightly-only options.
reorder_imports = true
reorder_modules = true

# Small readability cleanups that preserve code structure.
match_block_trailing_comma = true
remove_nested_parens = true
use_field_init_shorthand = true
