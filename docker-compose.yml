services:

  postgres:
    image: postgres:18
    restart: unless-stopped
    # Use SSH in Production
    ports:
      - 15432:5432
    # ---------------------
    env_file: [.env]
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data
    networks:
      - postgres-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  simpro-ingestion-service:
    build: .
    env_file: [.env]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${DATABASE_NAME}
      RUST_LOG: debug
    depends_on:
      postgres:
        condition: service_healthy
    networks: [postgres-network]
    restart: unless-stopped
    ports: ["3000:3000"]
    volumes:
      - .:/app
      - cargo_target:/app/target
    command: ["cargo", "run"]

  # https://ngrok.com/docs/using-ngrok-with/docker/compose
  ngrok:
    depends_on: [simpro-ingestion-service]
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_URL: ${NGROK_URL}
    networks: [postgres-network]
    # Webhook payloads are redirected here
    command: ["http", "--url=${NGROK_URL}", "http://simpro-ingestion-service:3000"]
    ports: ["4040:4040"]

networks: 
  postgres-network:
    driver: bridge

volumes:
  postgres_data:
  cargo_target: